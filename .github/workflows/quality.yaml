name: quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Format
        run: nix develop .#ci --command just format
      - name: Lint
        run: nix develop .#ci --command just lint
